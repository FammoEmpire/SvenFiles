<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FammoPedia.com</title>
<style>

.FE_Text {
  font-family: verdana;
  color: white;
}
  
  
.mainText {
  display: flex;
  gap: 20px;
}

.mainText_text {
  display: absolut;
  top: 100%;
  left: 10;
  box-sizing: border-box;
  background-color: white;
  color: black;
  border: 2px solid black;
  align-items: left;
  margin: 20px;
  padding: 20px;
}

.mainText img {
  width: 200px;
  height: auto;
  align-items: center;
}
  
body {
  margin: 0;
  font-family: Arial;
  box-sizing: border-box;
  color: black;
  background-color: white;
}

.searchBar {
width: 175px;
height: 45px;
display: flex;
align-items: left;
justify-content: space-between;
}
 /*SearchResults on screen class*/
.searchResults {
  background-color: white;
  color: black;
  border: 2px solid black;
  margin: 20px;
  padding: 20px;
}


/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  background: black;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 10px;
  box-sizing: border-box;
}

/* DESKTOP MENU */
.navLinks {
  display: flex;
  gap: 10px;
  align-items: left;
}

/* BUTTONS */
button {
  background: #333;
  color: white;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #555;
}

/* GAMES DROPDOWN */
.gamesContainer {
  position: relative;
  display: flex;

}

/* dropdown hidden by default */
.gamesMenu {
  position: absolute;
  top: 100%;
  left: 0;

  display: flex;
  flex-direction: column;
  gap: 10px;

  background: #111;
  padding: 10px;

  opacity: 0;
  transform: translateY(-10px);
  pointer-events: none;

  transition: 0.25s ease;
}

/* show class */
.gamesMenu.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* hover dropdown for desktop */
@media (min-width: 111801px) {
  .gamesContainer:hover .gamesMenu {
    position: absolute;
    top: 0;
    left: 100%;

    margin-left: 10px; /* adds space so it's not stuck to the button */

    transform: none;
    }
}

/* HAMBURGER */
.menuButton {
  display: none;
  background: #333;


 
}

/* MOBILE MODE */
@media (max-width: 450px) {

  .menuButton {
    display: block;
  }
  
  .navLogo {
    display: none;
  }

  .navLinks {
  display: flex;
  flex-direction: column;

  position: absolute;
  top: 60px;
  left: 10px;

  background: black;
  padding: 10px;
  gap: 10px;

  /* animation stuff */
  opacity: 0;


  pointer-events: none;
  transform: translateY(-20px);
  transition: 0.25s ease;
}

.navLinks.show {
  display: flex; 
  opacity: 1;
  transform: translateY(0);

  pointer-events: auto;
}

  /* mobile dropdown overrides hover */
  .gamesMenu {
    position: fixed;
    background: black;
    top: 20%;
    left: 100;

    margin-left: 100px; /* adds space so it's not stuck to the button */

  opacity: 0;
  transform: translateY(-20px); 

  pointer-events: none;

  transition: 0.25s ease;
  }
}
.city {
  background-color: tomato;
  color: white;
  border: 2px solid black;
  margin: 20px;
  padding: 20px;

}

.city img {
  width: 200px;
  height: auto;
}
</style>
</head>
<body>
<br>
<br>
<br>
<div class="navbar">
  
  

  <button class="menuButton" onclick="toggleMenu()">☰</button>
  
 
 <div class="navLinks">
    <img src="Logo.png" width="45px" height="45px">
  </div> 
  <div class="FE_Text">
    <h2 style="color: #ffffff;">FammoEmpire</h2>
  </div>
  <div class="searchBar">
   <input type="text" id="search" placeholder="Search...">
 </div>

  <div class="navLinks" id="menu">
    
    
    <button><a href="/Home/">Home</a></button>
    

    <!-- GAMES -->
    <div class="gamesContainer">

      <button onclick="toggleGames()">More ▸</button>

      <div class="gamesMenu" id="gamesMenu">
        <button><a href="/FammoPedia/">FammoPedia</a></button>
        <button><a href="/SurvivingDiddy/">SurvivingDiddy</a></button>
        <button><a href="/Home/">HomePage</a></button>
      </div>

    </div>

    <button>About</button>
    <button>Contact</button>
  </div>
  
<script>
const search = document.getElementById("search");
const items = document.querySelectorAll("#results li");

search.addEventListener("keyup", () => {
  const term = search.value.toLowerCase();

  items.forEach(item => {
    const text = item.textContent.toLowerCase();

    item.style.display =
      text.includes(term) ? "list-item" : "none";
  });
});
</script>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

function toggleGames() {
  document.getElementById("gamesMenu").classList.toggle("show");
}

/* click outside to close */
document.addEventListener("click", function(event) {

  let menu = document.getElementById("menu");
  let games = document.getElementById("gamesMenu");
  let button = document.querySelector(".menuButton");

  if (!menu.contains(event.target) && !button.contains(event.target)) {
    menu.classList.remove("show");
    games.classList.remove("show");
  }
});
</script>

</body>
</html>
